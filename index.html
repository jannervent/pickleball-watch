<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>PB Score</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root { --gold: #ffd700; --bg: #0d1b2a; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
    }

    /* ── SETUP ── */
    #setup {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 10px 10px 16px;
      gap: 6px;
      background: var(--bg);
    }

    .setup-title {
      font-size: 20px; font-weight: 900;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      padding: 4px 0 2px;
    }

    .setup-label {
      font-size: 14px; font-weight: 700;
      text-transform: uppercase;
      color: rgba(255,255,255,1);
      letter-spacing: 0.6px;
      margin-top: 2px;
    }

    .pill-row {
      display: flex;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 2px;
      gap: 2px;
      width: 100%;
    }

    .pill {
      flex: 1; padding: 7px 2px;
      background: transparent; border: none;
      border-radius: 6px;
      color: rgba(255,255,255,1);
      font-size: 18px; font-weight: 700;
      cursor: pointer;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pill.active { background: #fff; color: var(--bg); }

    .start-btn {
      width: 100%; padding: 11px;
      background: #388E3C; color: #fff;
      border: none; border-radius: 10px;
      font-size: 21px; font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px; cursor: pointer;
      margin-top: 6px;
      flex-shrink: 0;
    }
    .start-btn:active { filter: brightness(1.15); }

    /* ── GAME ── */
    #game {
      display: none;
      flex-direction: column;
      height: 100%;
      position: relative;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      cursor: pointer;
      position: relative;
      transition: background 0.1s;
    }
    .panel:active { filter: brightness(1.2); }
    .panel.serving { box-shadow: inset 0 0 0 3px var(--gold); }

    .team-name {
      font-size: 17px; font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 1;
    }
    .score {
      font-size: 96px; font-weight: 900;
      line-height: 1; letter-spacing: -2px;
    }
    .serve-dot {
      display: none;
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      margin-top: 2px;
    }
    .panel.serving .serve-dot { display: block; }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.12);
      position: relative;
      flex-shrink: 0;
    }
    .center-bar {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      padding: 0 6px;
    }
    .call-score {
      font-size: 17px; font-weight: 800;
      color: var(--gold); letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .undo-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,1);
      font-size: 15px; font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }
    .undo-btn:active { background: rgba(255,255,255,0.2); }

    .mode-tag {
      text-align: center;
      font-size: 14px;
      color: rgba(255,255,255,1);
      letter-spacing: 0.4px;
      padding: 4px 0;
      flex-shrink: 0;
    }

    /* Win overlay */
    #winOverlay {
      display: none;
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.9);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      z-index: 10;
    }
    #winOverlay.show { display: flex; }
    .win-title { font-size: 15px; color: rgba(255,255,255,1); text-transform: uppercase; letter-spacing: 1px; }
    .win-name  { font-size: 33px; font-weight: 900; color: var(--gold); }
    .win-score { font-size: 21px; color: rgba(255,255,255,1); }
    .win-btns  { display: flex; gap: 8px; margin-top: 6px; }
    .win-btn   { padding: 8px 14px; border-radius: 8px; border: none; font-size: 18px; font-weight: 800; cursor: pointer; }
    .win-btn.primary { background: var(--gold); color: #0d1b2a; }
    .win-btn.ghost   { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
  </style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-title">Pickleball</div>

  <div class="setup-label">Scoring Mode</div>
  <div class="pill-row">
    <button class="pill active" onclick="pick('mode','regular',this)">Regular</button>
    <button class="pill"        onclick="pick('mode','rally',this)">Rally</button>
  </div>

  <div class="setup-label">Points to Win</div>
  <div class="pill-row">
    <button class="pill active" onclick="pickPts(11,this)">11</button>
    <button class="pill"        onclick="pickPts(15,this)">15</button>
    <button class="pill"        onclick="pickPts(21,this)">21</button>
  </div>

  <div class="setup-label">First Serve</div>
  <div class="pill-row">
    <button class="pill active" onclick="pick('firstServe','A',this)">A</button>
    <button class="pill"        onclick="pick('firstServe','B',this)">B</button>
  </div>

  <button class="start-btn" onclick="startGame()">Start</button>
</div>

<!-- GAME -->
<div id="game">
  <div class="panel" id="panelA" onclick="addPoint('A')">
    <div class="team-name" id="dnA">Team A</div>
    <div class="score" id="sA">0</div>
    <div class="serve-dot"></div>
  </div>

  <div class="divider">
    <div class="center-bar">
      <span class="call-score" id="callScore">0 – 0</span>
      <button class="undo-btn" onclick="undoPoint()">Undo</button>
    </div>
  </div>

  <div class="panel" id="panelB" onclick="addPoint('B')">
    <div class="score" id="sB">0</div>
    <div class="team-name" id="dnB">Team B</div>
    <div class="serve-dot"></div>
  </div>

  <div class="mode-tag" id="modeTag">REGULAR · 11 PTS</div>
</div>

<!-- WIN OVERLAY -->
<div id="winOverlay">
  <div class="win-title">Winner</div>
  <div class="win-name"  id="winName">—</div>
  <div class="win-score" id="winScore">0 × 0</div>
  <div class="win-btns">
    <button class="win-btn ghost"   onclick="backToSetup()">New</button>
    <button class="win-btn primary" onclick="rematch()">Again</button>
  </div>
</div>

<script>
const cfg = { mode: 'regular', type: 'doubles', winPoints: 11, firstServe: 'A' };

function pick(key, val, btn) {
  cfg[key] = val;
  btn.closest('.pill-row').querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function pickPts(n, btn) {
  cfg.winPoints = n;
  document.querySelectorAll('#setup .pill-row:nth-child(8) .pill').forEach(b =>
    b.classList.toggle('active', parseInt(b.textContent) === n)
  );
}

let S = {}, colors = { A: '#1976D2', B: '#D32F2F' };

function makeState() {
  return {
    mode: cfg.mode, type: cfg.type, winPoints: cfg.winPoints,
    scoreA: 0, scoreB: 0,
    serving: cfg.firstServe,
    serverNum: cfg.mode === 'regular' ? 2 : 1,
    firstServe: cfg.mode === 'regular',
    history: [], over: false
  };
}

function startGame() {
  S = makeState();
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display  = 'flex';
  document.getElementById('sA').style.color = colors.A;
  document.getElementById('sB').style.color = colors.B;
  document.getElementById('modeTag').textContent =
    `${S.mode === 'regular' ? 'REGULAR' : 'RALLY'} · ${S.winPoints} PTS`;
  render();
}

function backToSetup() {
  document.getElementById('winOverlay').classList.remove('show');
  document.getElementById('game').style.display  = 'none';
  document.getElementById('setup').style.display = 'flex';
}

function rematch() {
  document.getElementById('winOverlay').classList.remove('show');
  S = makeState();
  render();
}

function addPoint(winner) {
  if (S.over) return;
  S.history.push({ scoreA: S.scoreA, scoreB: S.scoreB, serving: S.serving, serverNum: S.serverNum, firstServe: S.firstServe });
  if (S.mode === 'rally') rallyScore(winner);
  else                    regularScore(winner);
  checkWin();
  render();
}

function rallyScore(winner) {
  if (winner === 'A') S.scoreA++; else S.scoreB++;
  if (S.serving !== winner) { S.serving = winner; if (S.type === 'doubles') S.serverNum = 1; }
}

function regularScore(winner) {
  if (S.serving === winner) {
    if (winner === 'A') S.scoreA++; else S.scoreB++;
  } else {
    if (S.firstServe) { S.serving = winner; S.serverNum = 1; S.firstServe = false; }
    else if (S.type === 'doubles') {
      if (S.serverNum === 1) S.serverNum = 2;
      else { S.serving = winner; S.serverNum = 1; }
    } else { S.serving = winner; }
  }
}

function undoPoint() {
  if (!S.history.length || S.over) return;
  Object.assign(S, S.history.pop());
  render();
}

function checkWin() {
  const W = S.winPoints;
  const aW = S.scoreA >= W && S.scoreA - S.scoreB >= 2;
  const bW = S.scoreB >= W && S.scoreB - S.scoreA >= 2;
  if (!aW && !bW) return;
  S.over = true;
  const name  = aW ? 'Team A' : 'Team B';
  const color = aW ? colors.A : colors.B;
  document.getElementById('winName').textContent  = name;
  document.getElementById('winName').style.color  = color;
  document.getElementById('winScore').textContent = `${aW ? S.scoreA : S.scoreB} × ${aW ? S.scoreB : S.scoreA}`;
  document.getElementById('winOverlay').classList.add('show');
}

function render() {
  const isA = S.serving === 'A';
  document.getElementById('sA').textContent = S.scoreA;
  document.getElementById('sB').textContent = S.scoreB;
  document.getElementById('panelA').classList.toggle('serving', isA);
  document.getElementById('panelB').classList.toggle('serving', !isA);
  document.getElementById('panelA').style.background = hexAlpha(colors.A, isA  ? 0.18 : 0.06);
  document.getElementById('panelB').style.background = hexAlpha(colors.B, !isA ? 0.18 : 0.06);
  const sA = isA ? S.scoreA : S.scoreB;
  const sB = isA ? S.scoreB : S.scoreA;
  document.getElementById('callScore').textContent =
    S.mode === 'regular' && S.type === 'doubles'
      ? `${sA}–${sB}–${S.serverNum}`
      : `${S.scoreA} – ${S.scoreB}`;
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
</script>
</body>
</html>
